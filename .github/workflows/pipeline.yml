name: Pipeline CI

on: [push]          # run on every push

jobs:
  test:
    runs-on: ubuntu-latest    # use a clean Linux machine

    steps:
      - uses: actions/checkout@v3           # get your code
      - uses: actions/setup-python@v4       # install Python
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: python -m pip install pandas pyarrow pytest
      - name: Run tests
        run: python -m pytest test_pipeline.py -v